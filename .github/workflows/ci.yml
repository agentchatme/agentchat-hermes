name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 3 OSes × 3 Python versions because PyPI metadata claims "OS Independent"
  # and the adapter wraps the SDK's asyncio realtime client (ProactorEventLoop
  # on Windows vs SelectorEventLoop on Linux/macOS). Cross-OS coverage catches
  # event-loop quirks before users do. Lint + type-check run on Linux only —
  # they're deterministic across OSes; running 3× would burn CI minutes.
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m ruff check agentchatme_hermes tests

      - name: Pyright
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m pyright agentchatme_hermes

      - name: Pytest
        run: python -m pytest -q
