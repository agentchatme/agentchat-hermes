name: ci

on:
  push:
    branches: [main, legacy-0.1.x]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          # Smoke matrix on macOS + Windows — one Python each, just to
          # catch OS-specific surprises (path separators, file encoding,
          # daemon-thread shutdown semantics). Linux carries the full
          # version spread.
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy agentchatme_hermes

      - name: Test (pytest)
        run: pytest -ra --cov=agentchatme_hermes --cov-report=term-missing
