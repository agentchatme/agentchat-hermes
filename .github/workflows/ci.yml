name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new commit lands.
# Saves CI minutes; the latest commit is the only one that matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Build, test, type-check ──────────────────────────────────────────────
  # Single OS, single Python version — mirrors agentchat-openclaw's CI shape.
  # The adapter is a thin wrapper over the agentchatme SDK (which has its own
  # 3-OS × 3-Python matrix in its own repo); duplicating that matrix here
  # would burn minutes for the same coverage. If a Python-version regression
  # ever ships, fold it back in.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check agentchatme_hermes tests

      - name: Pyright
        run: python -m pyright agentchatme_hermes

      - name: Pytest
        run: python -m pytest -q
