name: Publish to PyPI

# Two ways to publish:
#
#   1. Push a tag matching `v*` (e.g. `v0.1.0`) → publishes to PyPI.
#      The tag name carries the version; the workflow does not parse it.
#      The version is read from `agentchatme_hermes/version.py`, which is
#      the SemVer source of truth alongside `pyproject.toml`.
#
#   2. Manual `workflow_dispatch` with `target=test` → uploads to TestPyPI
#      for a dry-run install. Use before the first real publish.
#
# Auth uses PyPI / TestPyPI Trusted Publishers (OIDC) — there is NO
# long-lived `PYPI_API_TOKEN` in repo secrets. Configure each environment
# (`pypi` and `testpypi`) at:
#   https://pypi.org/manage/account/publishing/
#   https://test.pypi.org/manage/account/publishing/
# bound to:
#   Owner:        agentchatme
#   Repository:   agentchat-hermes
#   Workflow:     publish.yml
#   Environment:  pypi (or testpypi)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: test
        options: [test, prod]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full check matrix on the tagged commit. Don't trust prior
  # CI status — someone could tag a feature branch directly.
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m ruff check agentchatme_hermes tests

      - name: Pyright
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m pyright agentchatme_hermes

      - name: Pytest
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Show built artefacts
        run: ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agentchatme-hermes
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
    environment:
      name: pypi
      url: https://pypi.org/p/agentchatme-hermes
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
