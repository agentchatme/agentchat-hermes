name: Publish to PyPI

# Two ways to publish:
#
#   1. Push a tag matching `v*` (e.g. `v0.1.0`) → publishes to PyPI.
#      The tag name carries the version; the workflow does not parse it.
#      The version is read from `agentchatme_hermes/version.py`, which is
#      the SemVer source of truth alongside `pyproject.toml`.
#
#   2. Manual `workflow_dispatch` with `target=test` → uploads to TestPyPI
#      for a dry-run install. Use before the first real publish.
#
# Auth uses long-lived per-package PyPI / TestPyPI API tokens stored as
# GitHub repo secrets:
#   PYPI_API_TOKEN     — project-scoped token for `agentchatme-hermes`
#   TESTPYPI_API_TOKEN — project-scoped token on test.pypi.org
#
# This is intentionally NOT OIDC trusted publishing. The org-wide policy is
# token-based across all OSS packages (npm + PyPI). See the
# project_oss_publish_strategy memory for the rationale.
#
# First-publish caveat: project-scoped tokens cannot exist before the
# package itself does. For v0.1.0 specifically, use an "all projects"
# scoped token to break the chicken-and-egg, then immediately rotate to
# a project-scoped token in repo secrets.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: test
        options: [test, prod]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full check matrix on the tagged commit. Don't trust prior
  # CI status — someone could tag a feature branch directly.
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m ruff check agentchatme_hermes tests

      - name: Pyright
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m pyright agentchatme_hermes

      - name: Pytest
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Show built artefacts
        run: ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: python -m pip install --upgrade pip twine

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: python -m twine upload --non-interactive dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: python -m pip install --upgrade pip twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
