name: Publish

# One registry, one trigger. Tag push (`v*`) publishes to PyPI. Manual
# `workflow_dispatch` is for dry-runs and recovery:
#
#   target=test   TestPyPI dry-run (https://test.pypi.org)
#   target=prod   PyPI prod (same as tag push)
#
# Auth uses long-lived per-package PyPI / TestPyPI API tokens stored as
# GitHub repo secrets:
#   PYPI_API_TOKEN     — token for `agentchatme-hermes` on pypi.org
#   TESTPYPI_API_TOKEN — token on test.pypi.org
#
# Generate at:
#   https://pypi.org/manage/account/token/
#   https://test.pypi.org/manage/account/token/
#
# First-publish caveat: project-scoped tokens cannot exist before the
# project itself does. For v0.1.0, mint an "all projects" token, publish
# once, then immediately rotate to a project-scoped token in repo
# secrets and revoke the all-projects one.
#
# This is intentionally NOT OIDC trusted publishing. Org-wide policy is
# token-based across all OSS packages (npm + PyPI). Mirrors the auth
# pattern in agentchat-openclaw / agentchat-typescript / agentchat-mcp.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: prod
        options: [test, prod]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full test suite on the tagged commit. Don't trust prior
  # CI status — someone could tag a feature branch directly and skip the
  # main-branch sweep.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check agentchatme_hermes tests

      - name: Pyright
        run: python -m pyright agentchatme_hermes

      - name: Pytest
        run: python -m pytest -q

  publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Show built artefacts
        # Surface the version + filenames in CI logs so a release is auditable
        # at a glance without downloading the artifact. Mirrors the OpenClaw
        # "echo Publishing @agentchatme/openclaw@${PKG_VERSION}" line.
        run: |
          PKG_VERSION="$(python -c 'import agentchatme_hermes; print(agentchatme_hermes.__version__)')"
          echo "Publishing agentchatme-hermes@${PKG_VERSION}"
          ls -lh dist

      - name: Publish to TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: python -m twine upload --non-interactive dist/*

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
